<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucas Agenda Act III</title>
  <style>
    :root {
      --bg: #000;
      --line: #8fc7cf;
      --text: #cdeef2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at center, rgba(15, 55, 65, 0.18) 0%, rgba(0, 0, 0, 0.94) 65%),
        #000;
      color: var(--text);
      font-family: "Courier New", Courier, monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 12% 14%, rgba(255,255,255,0.9) 0 1px, transparent 2px),
        radial-gradient(circle at 80% 18%, rgba(255,255,255,0.65) 0 1px, transparent 2px),
        radial-gradient(circle at 22% 74%, rgba(255,255,255,0.75) 0 1px, transparent 2px),
        radial-gradient(circle at 72% 68%, rgba(255,255,255,0.8) 0 1px, transparent 2px);
      background-size: 260px 260px, 320px 320px, 280px 280px, 300px 300px;
      opacity: 0.5;
    }

    .memo {
      width: min(760px, 100%);
      position: relative;
      border: 2px solid var(--line);
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(180, 255, 255, 0.07) 0px,
          rgba(180, 255, 255, 0.07) 1px,
          transparent 2px,
          transparent 4px
        ),
        linear-gradient(180deg, rgba(7,18,24,0.96), rgba(3,8,12,0.98));
      padding: 18px 22px;
      box-shadow:
        0 0 18px rgba(127,182,190,0.14),
        inset 0 0 20px rgba(127,182,190,0.07);
      clip-path: none;
    }

    .title {
      font-size: 1.9rem;
      letter-spacing: 1px;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    .rule {
      height: 1px;
      background: rgba(143,199,207,0.55);
      margin-bottom: 14px;
    }

    .content {
      font-size: 1.08rem;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    @media (max-width: 640px) {
      body { padding: 12px; }
      .memo {
        padding: 14px 16px;
        clip-path: none;
      }
      .title { font-size: 1.35rem; }
      .content { font-size: 0.96rem; }
    }
  </style>
</head>
<body>
  <section class="memo">
    <div class="title">LUCAS'S AGENDA ACT III</div>
    <div class="rule"></div>
    <div class="content">You must stop Weyland-Yutani from getting an alien specimen back to Earth at any cost-even if it means murder and suicide. Kill anyone with detailed knowledge about the 26 Draconis Strain.</div>
  </section>
</body>
</html>
